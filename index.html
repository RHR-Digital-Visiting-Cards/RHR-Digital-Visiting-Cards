<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - RHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 2.5rem; }
        .profile-img { width: 110px; height: 110px; object-fit: cover; border: 4px solid white; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .icon-box { min-width: 48px; min-height: 48px; flex: 1; display: flex; align-items: center; justify-content: center; border-radius: 1rem; background: #f8fafc; color: #64748b; border: 1px solid #f1f5f9; transition: all 0.3s; }
        .icon-box:hover { background: #eff6ff; color: #2563eb; transform: translateY(-2px); }
        .social-text-link { flex: 1; padding: 1rem; text-align: center; border-radius: 1rem; background: #f8fafc; border: 1px solid #f1f5f9; color: #334155; font-weight: 600; font-size: 0.8rem; transition: all 0.3s; }
        .social-text-link:hover { background: #eff6ff; color: #2563eb; transform: translateY(-2px); }
        
        /* Transition properties for smooth color changes */
        #header-bg, #save-btn-view, body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body id="body-bg" class="min-h-screen flex items-center justify-center p-4 bg-[#0100f0]"> <button onclick="openModal('pin-modal')" class="fixed top-6 right-6 p-3 bg-white shadow-lg rounded-full z-50 text-slate-400">
        <i data-lucide="settings" class="w-5 h-5"></i>
    </button>

    <div id="main-loader" class="text-slate-400 font-medium animate-pulse italic">RHR Smart Card is connecting...</div>
    
    <div id="card-container" class="max-w-sm w-full glass-card shadow-2xl overflow-hidden hidden">
        <div id="header-bg" class="h-28 bg-[#1e293b]"></div> <div class="px-6 pb-8 -mt-14 text-center">
            <img id="view-photo" src="" alt="Profile" class="profile-img rounded-full mx-auto mb-3 bg-slate-100">
            <h1 id="view-name" class="text-xl font-bold tracking-tight text-slate-800"></h1>
            <p id="view-title" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest italic"></p>
            <p id="view-company" class="text-slate-400 text-[10px] font-bold mb-4 uppercase tracking-wider"></p>
            
            <div class="mb-6 px-2">
                <p id="view-bio" class="text-slate-500 text-xs leading-relaxed italic"></p>
            </div>

            <button id="save-btn-view" onclick="saveVCF()" class="w-full bg-[#1e293b] text-white py-4 rounded-2xl font-bold text-sm mb-6 flex items-center justify-center gap-2 shadow-lg hover:bg-slate-800 transition-all">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Save Contact
            </button>

            <div class="flex justify-center gap-2 mb-3">
                <a id="link-mobile" href="#" class="icon-box"><i data-lucide="phone" class="w-5 h-5"></i></a>
                <a id="link-email" href="#" class="icon-box"><i data-lucide="mail" class="w-5 h-5"></i></a>
                <a id="link-website" href="#" target="_blank" class="icon-box"><i data-lucide="globe" class="w-5 h-5"></i></a>
                <div class="icon-box opacity-20 border-dashed"></div>
                <div class="icon-box opacity-20 border-dashed"></div>
            </div>

            <div class="flex justify-center gap-2 mb-8">
                <a id="link-facebook" href="#" target="_blank" class="social-text-link">Facebook</a>
                <a id="link-linkedin" href="#" target="_blank" class="social-text-link">LinkedIn</a>
            </div>

            <div class="space-y-3 text-left">
                <div class="flex gap-4 items-start p-4 bg-slate-50/50 rounded-2xl border border-slate-100 shadow-inner">
                    <i data-lucide="map-pin" class="w-5 h-5 text-slate-400 mt-1"></i>
                    <div>
                        <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">Office Address</p>
                        <p id="view-address" class="text-sm text-slate-700 font-semibold"></p>
                    </div>
                </div>
                <div class="flex gap-4 items-start p-4 bg-slate-50/50 rounded-2xl border border-slate-100 shadow-inner">
                    <i data-lucide="briefcase" class="w-5 h-5 text-slate-400 mt-1"></i>
                    <div>
                        <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">Services</p>
                        <p id="view-services" class="text-sm text-slate-700 font-semibold"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full text-center shadow-2xl border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-slate-800">Admin Access</h3>
            <input type="password" id="pin-input" class="w-full text-center text-3xl font-bold border-b-2 border-slate-100 focus:border-blue-600 focus:outline-none mb-8" maxlength="4" placeholder="••••">
            <div class="flex gap-3">
                <button onclick="closeModal('pin-modal')" class="flex-1 py-3 text-slate-400 font-bold text-xs uppercase">Back</button>
                <button onclick="checkPin()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase shadow-lg">Login</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-white z-[200] hidden overflow-y-auto p-6">
        <div class="max-w-md mx-auto pb-20 text-slate-800">
            <div class="flex justify-between items-center mb-10 sticky top-0 bg-white py-4 border-b">
                <h2 class="text-xl font-bold text-slate-800">Profile & Card Settings</h2>
                <button onclick="closeModal('edit-modal')" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div id="edit-form-fields" class="space-y-5"></div>
            
            <div class="mt-8 p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-5">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest border-b pb-2">Appearance (Saves Locally)</p>
                
                <div class="space-y-4">
                    <div class="flex items-center justify-between gap-4">
                        <label class="text-xs font-semibold text-slate-700">Card Header (Top Section)</label>
                        <input type="color" id="inp-headercolor" oninput="changeColors()" class="w-10 h-10 border-0 cursor-pointer" value="#1e293b">
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <label class="text-xs font-semibold text-slate-700">Save Button Color</label>
                        <input type="color" id="inp-btncolor" oninput="changeColors()" class="w-10 h-10 border-0 cursor-pointer" value="#1e293b">
                    </div>
                    <div class="flex items-center justify-between gap-4 border-t pt-4">
                        <label class="text-xs font-semibold text-slate-700">Main Background Color</label>
                        <input type="color" id="inp-bgcolor" oninput="changeColors()" class="w-10 h-10 border-0 cursor-pointer" value="#0100f0">
                    </div>
                </div>
            </div>

            <div class="mt-8 p-5 bg-blue-50/50 rounded-2xl border border-blue-100 flex items-center justify-between gap-4">
                <div class="flex-1">
                    <p class="text-[10px] font-extrabold text-blue-400 uppercase tracking-widest mb-1">Customer Support ID</p>
                    <p id="display-id" class="text-base font-mono font-extrabold text-blue-800 tracking-tighter"></p>
                </div>
                <a id="rhr-support-btn" href="https://t.me/yourtelegramusername" target="_blank" class="text-[11px] font-extrabold bg-blue-100 text-blue-700 px-4 py-2.5 rounded-lg uppercase shadow hover:bg-blue-200 transition-colors">
                    RHR SUPPORT
                </a>
            </div>

            <button onclick="saveData()" id="save-btn" class="w-full mt-10 py-5 bg-slate-900 text-white rounded-2xl font-bold uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all">Synchronize Cloud Data</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9mu41IvW_8bYJubxK4SeNTLj0aDSy6PvODfywQNd2z3xEVH6LSBdFlVsTlDFw9ljBMA/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "RHR-BIZ-01";
        let userData = {};

        async function init() {
            lucide.createIcons();
            // Critical: Apply local color settings first
            applyLocalColors();
            
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) { 
                    userData = result.data; 
                    renderView(); 
                } else { document.getElementById('main-loader').innerText = "Card ID Not Found!"; }
            } catch (e) { console.error(e); }
        }

        function renderView() {
            document.getElementById('view-photo').src = userData.Photo || 'https://via.placeholder.com/150';
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-title').innerText = userData.Title;
            document.getElementById('view-company').innerText = userData.Company;
            document.getElementById('view-bio').innerText = userData.Bio || "";
            document.getElementById('view-address').innerText = userData.Address;
            document.getElementById('view-services').innerText = userData.Services;

            document.getElementById('link-mobile').href = `tel:${userData.Mobile}`;
            document.getElementById('link-email').href = `mailto:${userData.Email}`;
            document.getElementById('link-website').href = userData.Website;
            document.getElementById('link-facebook').href = userData.Facebook;
            document.getElementById('link-linkedin').href = userData.LinkedIn;

            document.getElementById('main-loader').classList.add('hidden');
            document.getElementById('card-container').classList.remove('hidden');
            
            setTimeout(() => { lucide.createIcons(); }, 100);
        }

        // --- Color Customization Logic ---
        function applyLocalColors() {
            const settings = JSON.parse(localStorage.getItem(`rhr_card_colors_${PROFILE_ID}`)) || {};
            // BG Color
            const bgColor = settings.bgColor || "#0100f0";
            document.getElementById('body-bg').style.backgroundColor = bgColor;
            document.getElementById('inp-bgcolor').value = bgColor;
            
            // Header Color
            const headerColor = settings.headerColor || "#1e293b";
            document.getElementById('header-bg').style.backgroundColor = headerColor;
            document.getElementById('inp-headercolor').value = headerColor;
            
            // Button Color
            const btnColor = settings.btnColor || "#1e293b";
            document.getElementById('save-btn-view').style.backgroundColor = btnColor;
            document.getElementById('inp-btncolor').value = btnColor;
        }

        function changeColors() {
            const settings = {
                bgColor: document.getElementById('inp-bgcolor').value,
                headerColor: document.getElementById('inp-headercolor').value,
                btnColor: document.getElementById('inp-btncolor').value
            };
            
            // Apply live changes
            document.getElementById('body-bg').style.backgroundColor = settings.bgColor;
            document.getElementById('header-bg').style.backgroundColor = settings.headerColor;
            document.getElementById('save-btn-view').style.backgroundColor = settings.btnColor;
            
            // Save locally
            localStorage.setItem(`rhr_card_colors_${PROFILE_ID}`, JSON.stringify(settings));
        }
        // ---------------------------------

        function checkPin() {
            if(document.getElementById('pin-input').value == (userData.Admin_PIN || "1111")) {
                setupEditForm();
                document.getElementById('display-id').innerText = PROFILE_ID;
                closeModal('pin-modal');
                openModal('edit-modal');
            } else { alert("Incorrect PIN!"); }
            document.getElementById('pin-input').value = "";
        }

        function setupEditForm() {
            const fields = [
                {id: 'name', label: 'Full Name', val: userData.Name},
                {id: 'title', label: 'Designation', val: userData.Title},
                {id: 'company', label: 'Company Name', val: userData.Company},
                {id: 'bio', label: 'About/Bio', val: userData.Bio},
                {id: 'mobile', label: 'Mobile Number', val: userData.Mobile},
                {id: 'email', label: 'Email Address', val: userData.Email},
                {id: 'website', label: 'Website URL', val: userData.Website},
                {id: 'facebook', label: 'Facebook URL', val: userData.Facebook},
                {id: 'linkedin', label: 'LinkedIn URL', val: userData.LinkedIn},
                {id: 'address', label: 'Office Address', val: userData.Address},
                {id: 'services', label: 'Expertise/Services', val: userData.Services},
                {id: 'photo', label: 'Profile Photo URL', val: userData.Photo},
                {id: 'new-pin', label: 'Admin Access PIN', val: userData.Admin_PIN}
            ];
            document.getElementById('edit-form-fields').innerHTML = fields.map(f => `
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-widest">${f.label}</label>
                    ${f.id === 'bio' ? `<textarea id="inp-bio" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-medium text-slate-700 focus:bg-white focus:ring-1 focus:ring-blue-100 transition-all text-sm" rows="2">${f.val || ''}</textarea>` : `<input id="inp-${f.id}" value="${f.val || ''}" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-medium text-slate-700 focus:bg-white focus:ring-1 focus:ring-blue-100 transition-all text-sm">`}
                </div>`).join('');
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Synchronizing..."; btn.disabled = true;
            const data = { 
                id: PROFILE_ID, 
                pin: document.getElementById('inp-new-pin').value,
                name: document.getElementById('inp-name').value, 
                title: document.getElementById('inp-title').value,
                company: document.getElementById('inp-company').value, 
                bio: document.getElementById('inp-bio').value,
                mobile: document.getElementById('inp-mobile').value,
                email: document.getElementById('inp-email').value, 
                website: document.getElementById('inp-website').value,
                facebook: document.getElementById('inp-facebook').value, 
                linkedin: document.getElementById('inp-linkedin').value,
                address: document.getElementById('inp-address').value, 
                services: document.getElementById('inp-services').value,
                photo: document.getElementById('inp-photo').value
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                location.reload();
            } catch (e) { alert("Data sync failed! Please try again."); btn.disabled = false; btn.innerText = "Synchronize Cloud Data"; }
        }

        function saveVCF() {
            const vcfData = `BEGIN:VCARD\nVERSION:3.0\nFN:${userData.Name}\nORG:${userData.Company}\nTITLE:${userData.Title}\nTEL;TYPE=CELL:${userData.Mobile}\nEMAIL:${userData.Email}\nEND:VCARD`;
            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${userData.Name}.vcf`; a.click();
        }

        function openModal(id) { document.getElementById(id).style.display = (id === 'edit-modal' ? 'block' : 'flex'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        window.onload = () => { init(); };
    </script>
</body>
</html>
