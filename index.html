<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - RHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
        .glass-card { transition: all 0.4s ease; border-radius: 2.5rem; }
        
        /* Themes */
        .theme-classic { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .theme-border { background: #ffffff; border: 2px solid #e2e8f0; }
        .theme-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .theme-minimal { background: #ffffff; border-radius: 1rem; box-shadow: none; border: 1px solid #f1f5f9; }
        .theme-bold { background: #ffffff; border-top: 10px solid; }

        .profile-img { width: 110px; height: 110px; object-fit: cover; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .theme-btn { padding: 10px; border: 2px solid #f1f5f9; border-radius: 12px; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; }
        .theme-btn.active { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
        .edit-input { w-full p-4 bg-slate-50 rounded-xl border-none outline-none text-sm transition-all; }
        .edit-input:focus { bg-white; ring-1; ring-blue-100; }
    </style>
</head>
<body id="body-bg" class="min-h-screen flex items-center justify-center p-4 bg-[#f1ff2e]">

    <button onclick="openModal('pin-modal')" class="fixed top-6 right-6 p-3 bg-white shadow-lg rounded-full z-50 text-slate-400">
        <i data-lucide="settings" class="w-5 h-5"></i>
    </button>

    <div id="card-container" class="max-w-sm w-full glass-card shadow-2xl overflow-hidden hidden theme-classic">
        <div id="header-bg" class="h-28 bg-[#1e293b]"></div>
        
        <div class="px-6 pb-8 -mt-14 text-center">
            <img id="view-photo" src="" class="profile-img rounded-full mx-auto mb-3 bg-slate-100">
            <h1 id="view-name" class="text-xl font-bold text-slate-800 tracking-tight"></h1>
            <p id="view-title" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest italic"></p>
            <p id="view-company" class="text-slate-400 text-[10px] font-bold mt-1 uppercase"></p>
            <p id="view-bio" class="text-slate-500 text-xs mt-4 italic leading-relaxed"></p>

            <button id="save-btn-view" onclick="saveVCF()" class="w-full text-white py-4 rounded-2xl font-bold text-sm my-6 flex items-center justify-center gap-2 shadow-lg hover:bg-slate-800 transition-all">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Save Contact
            </button>

            <div class="space-y-4 text-left">
                <div class="flex gap-4 items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <i data-lucide="map-pin" class="w-5 h-5 text-slate-400 mt-1"></i>
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Office Address</p>
                        <p id="view-address" class="text-sm text-slate-700 font-semibold"></p>
                    </div>
                </div>
                <div class="p-4 bg-blue-50 rounded-2xl flex items-center justify-between gap-4">
                    <div>
                        <p class="text-[9px] font-extrabold text-blue-400 uppercase tracking-widest">Support ID</p>
                        <p id="display-support-id" class="text-sm font-mono font-extrabold text-blue-700"></p>
                    </div>
                    <a href="https://t.me/rhr_digital_Service" target="_blank" class="px-4 py-2.5 bg-blue-600 text-white rounded-lg text-xs font-bold uppercase shadow-lg">RHR Support</a>
                </div>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center p-6 z-[100]">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center">
            <h3 class="font-bold mb-6">Enter Admin PIN</h3>
            <input type="password" id="pin-input" class="w-full text-center text-3xl font-bold border-b-2 mb-8 focus:outline-none" maxlength="4" placeholder="••••">
            <div class="flex gap-2">
                <button onclick="closeModal('pin-modal')" class="flex-1 text-slate-400 font-bold">Cancel</button>
                <button onclick="checkPin()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Login</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-white hidden overflow-y-auto p-6 z-[200]">
        <div class="max-w-md mx-auto pb-10">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-xl font-bold text-slate-800">Edit Profile & Style</h2>
                <button onclick="closeModal('edit-modal')" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Profile Information</p>
            <div id="edit-form-fields" class="space-y-4 mb-8"></div>
            
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 border-t pt-4">Card Style (UI Theme)</p>
            <div class="grid grid-cols-3 gap-2 mb-8">
                <div onclick="setTheme('theme-classic')" id="btn-theme-classic" class="theme-btn">Classic</div>
                <div onclick="setTheme('theme-border')" id="btn-theme-border" class="theme-btn">Modern</div>
                <div onclick="setTheme('theme-glass')" id="btn-theme-glass" class="theme-btn">Glass</div>
                <div onclick="setTheme('theme-minimal')" id="btn-theme-minimal" class="theme-btn">Minimal</div>
                <div onclick="setTheme('theme-bold')" id="btn-theme-bold" class="theme-btn">Bold</div>
            </div>

            <div class="p-5 bg-slate-50 rounded-2xl space-y-4 mb-8">
                <p class="text-[10px] font-bold text-slate-400 uppercase text-center border-b pb-2 mb-4">Colors (Cloud Sync)</p>
                <div class="flex justify-between items-center gap-4">
                    <label class="text-xs font-semibold">Header & Buttons</label>
                    <input type="color" id="inp-headercolor" oninput="liveColor()" class="w-10 h-10 border-none bg-transparent">
                </div>
                <div class="flex justify-between items-center gap-4 border-t pt-2">
                    <label class="text-xs font-semibold">Main Background</label>
                    <input type="color" id="inp-bgcolor" oninput="liveColor()" class="w-10 h-10 border-none bg-transparent">
                </div>
            </div>

            <button onclick="saveToCloud()" id="sync-btn" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold uppercase shadow-xl hover:bg-slate-800 transition-all">Synchronize Cloud Data</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_NEW_DEPLOYMENT_URL_HERE";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "RHR-BIZ-01";
        let userData = {};
        let currentTheme = "theme-classic";

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) {
                    userData = result.data;
                    document.getElementById('display-support-id').innerText = PROFILE_ID;
                    applyColors(userData.BG_Color, userData.Header_Color, userData.Theme);
                    renderView();
                }
            } catch (e) { console.error("Initialize failed", e); }
        }

        function applyColors(bg, head, theme) {
            document.body.style.backgroundColor = bg || "#f1ff2e";
            document.getElementById('header-bg').style.backgroundColor = head || "#1e293b";
            document.getElementById('save-btn-view').style.backgroundColor = head || "#1e293b";
            
            const card = document.getElementById('card-container');
            card.className = "max-w-sm w-full glass-card shadow-2xl overflow-hidden " + (theme || 'theme-classic');
            
            if(theme === 'theme-bold') {
                card.style.borderTopColor = head || "#1e293b";
            } else {
                card.style.borderTopColor = "transparent";
            }
            
            currentTheme = theme || 'theme-classic';
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + currentTheme);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function liveColor() {
            applyColors(document.getElementById('inp-bgcolor').value, document.getElementById('inp-headercolor').value, currentTheme);
        }

        function setTheme(t) {
            currentTheme = t;
            liveColor();
        }

        async function saveToCloud() {
            const btn = document.getElementById('sync-btn');
            const originalText = btn.innerText;
            btn.innerText = "Synchronizing with Cloud...";
            btn.disabled = true;

            const data = {
                id: PROFILE_ID,
                bgColor: document.getElementById('inp-bgcolor').value,
                headerColor: document.getElementById('inp-headercolor').value,
                theme: currentTheme,
                // Ager fields update করার জন্য
                name: document.getElementById('inp-name').value, 
                mobile: document.getElementById('inp-mobile').value, 
                title: document.getElementById('inp-title').value,
                photo: document.getElementById('inp-photo').value, 
                bio: document.getElementById('inp-bio').value, 
                address: document.getElementById('inp-address').value,
                company: document.getElementById('inp-company').value, 
                services: document.getElementById('inp-services').value,
                email: document.getElementById('inp-email').value, 
                website: document.getElementById('inp-website').value, 
                facebook: document.getElementById('inp-facebook').value, 
                linkedin: document.getElementById('inp-linkedin').value,
                pin: document.getElementById('inp-new-pin').value // Admin PIN
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Saved to Google Sheets! Everyone will now see this update.");
                location.reload();
            } catch (e) {
                alert("Sync failed. Check your internet.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function renderView() {
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-photo').src = userData.Photo || 'https://via.placeholder.com/150';
            document.getElementById('view-title').innerText = userData.Title;
            document.getElementById('view-bio').innerText = userData.Bio || "";
            document.getElementById('view-address').innerText = userData.Address;
            document.getElementById('view-company').innerText = userData.Company || "";
            document.getElementById('card-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function checkPin() {
            const pin = document.getElementById('pin-input').value;
            if(pin == (userData.Admin_PIN || "1111")) {
                setupEditForm();
                closeModal('pin-modal');
                openModal('edit-modal');
                document.getElementById('inp-bgcolor').value = userData.BG_Color || "#f1ff2e";
                document.getElementById('inp-headercolor').value = userData.Header_Color || "#1e293b";
            } else { alert("Incorrect Admin PIN"); }
        }

        function setupEditForm() {
            const fields = [
                {id: 'name', label: 'Full Name', val: userData.Name},
                {id: 'title', label: 'Designation', val: userData.Title},
                {id: 'company', label: 'Company Name', val: userData.Company},
                {id: 'bio', label: 'About/Bio', val: userData.Bio},
                {id: 'mobile', label: 'Mobile Number', val: userData.Mobile},
                {id: 'email', label: 'Email Address', val: userData.Email},
                {id: 'website', label: 'Website URL', val: userData.Website},
                {id: 'facebook', label: 'Facebook URL', val: userData.Facebook},
                {id: 'linkedin', label: 'LinkedIn URL', val: userData.LinkedIn},
                {id: 'address', label: 'Office Address', val: userData.Address},
                {id: 'services', label: 'Expertise/Services', val: userData.Services},
                {id: 'photo', label: 'Profile Photo URL', val: userData.Photo},
                {id: 'new-pin', label: 'Admin PIN', val: userData.Admin_PIN}
            ];
            document.getElementById('edit-form-fields').innerHTML = fields.map(f => `
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-widest">${f.label}</label>
                    ${f.id === 'bio' ? `<textarea id="inp-bio" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-medium transition-all text-sm" rows="2">${f.val || ''}</textarea>` : `<input id="inp-${f.id}" value="${f.val || ''}" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-medium transition-all text-sm">`}
                </div>`).join('');
        }

        function saveVCF() {
            const vcfData = `BEGIN:VCARD\nVERSION:3.0\nFN:${userData.Name}\nORG:${userData.Company}\nTITLE:${userData.Title}\nTEL:${userData.Mobile}\nEMAIL:${userData.Email}\nEND:VCARD`;
            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${userData.Name}.vcf`; a.click();
        }

        function openModal(id) { document.getElementById(id).style.display = (id === 'edit-modal' ? 'block' : 'flex'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
